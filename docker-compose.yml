# Local stack: backend + frontend. SQLite lives in a named volume so data
# survives container rebuilds.
#   docker compose up --build
# Then open http://localhost:5173 (admin) — the API is on http://localhost:8000.
services:
  backend:
    build: ./backend
    environment:
      # SQLite on the mounted volume (four slashes = absolute path).
      DATABASE_URL: sqlite:////data/raffler.db
      # Dev-only secret; override in any real deployment.
      SECRET_KEY: local-dev-secret-key-at-least-32-bytes-long
      BASE_URL: http://localhost:5173
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      FRONTEND_ORIGIN: http://localhost:5173
      API_ORIGIN: http://localhost:8000
      # Emails granted the club plan (everyone else self-signs-up as free).
      PREMIUM_EMAILS: ""
      # Optional Google OAuth — leave blank to use email/password login only.
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
    volumes:
      - dbdata:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Browser talks to the API directly, so this is the host-visible URL.
        VITE_API_BASE: http://localhost:8000
        VITE_BASE_URL: http://localhost:5173
    depends_on:
      - backend
    environment:
      PORT: 5173
    ports:
      - "5173:5173"

volumes:
  dbdata:
